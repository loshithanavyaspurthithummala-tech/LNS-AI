<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Professional Plan - LNS AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color:#fff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:900px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:40px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
  font-size:32px;
  margin-bottom:10px;
  color:#38bdf8;
}

.subtitle{
  color:#cbd5e1;
  margin-bottom:25px;
}

.plan-box{
  background: rgba(255,255,255,0.08);
  padding:25px;
  border-radius:15px;
  margin-bottom:25px;
}

.price{
  font-size:28px;
  font-weight:600;
  margin-bottom:10px;
}

.features{
  list-style:none;
  line-height:2;
  color:#e2e8f0;
}

.features li::before{
  content:"✔ ";
  color:#22c55e;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  background:#38bdf8;
  color:#000;
  font-weight:600;
  border-radius:10px;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  background:#0ea5e9;
  transform:scale(1.05);
}

.note{
  margin-top:15px;
  font-size:14px;
  color:#94a3b8;
}
</style>

</head>

<body>

<div class="container">

  <h1>Professional Plan 🚀</h1>
  <p class="subtitle">Best for freelancers, students & small businesses</p>

  <div class="plan-box">
    <div class="price">₹50 / month</div>

    <ul class="features">
      <li>Access to Advanced AI Features</li>
      <li>Faster Response System</li>
      <li>Priority Support</li>
      <li>Unlimited Basic Requests</li>
      <li>Dashboard Access</li>
    </ul>

    <!-- PAYMENT BUTTON -->
    <a class="btn" href="upi://pay?pa=6305393802@ibl&pn=LNS%20AI&am=50&cu=INR">
      Pay Now
    </a>

    <p class="note">
      After payment, access will be activated manually or via backend system.
    </p>
  </div>

</div>

</body>
</html>
