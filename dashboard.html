<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LNS AI Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#050816;
color:#fff;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

/* Sidebar */

.sidebar{
width:250px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
padding:25px;
border-right:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:32px;
font-weight:700;
margin-bottom:40px;
}

.logo span{
background:linear-gradient(90deg,#00d4ff,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.menu{
display:flex;
flex-direction:column;
gap:15px;
}

.menu a{
padding:14px;
border-radius:12px;
text-decoration:none;
color:white;
background:rgba(255,255,255,.05);
transition:.3s;
cursor:pointer;
}

.menu a:hover{
background:linear-gradient(90deg,#00d4ff,#8b5cf6);
transform:translateX(5px);
}

/* Main */

.main{
flex:1;
padding:35px;
}

/* Topbar */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
}

.topbar h1{
font-size:36px;
}

.topbar span{
color:#00d4ff;
}

.topbar button{
padding:14px 24px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#00d4ff,#8b5cf6);
color:white;
font-weight:600;
cursor:pointer;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:35px;
}

.card{
background:rgba(255,255,255,.05);
padding:30px;
border-radius:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card h2{
font-size:36px;
background:linear-gradient(90deg,#00d4ff,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card p{
margin-top:10px;
color:#cbd5e1;
}

/* Chat */

.chat-box{
background:rgba(255,255,255,.05);
padding:25px;
border-radius:20px;
}

.chat-box h2{
margin-bottom:20px;
}

.messages{
height:300px;
overflow-y:auto;
background:rgba(255,255,255,.04);
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.messages::-webkit-scrollbar{
width:6px;
}

.messages::-webkit-scrollbar-thumb{
background:#8b5cf6;
border-radius:10px;
}

.bot,
.user{
padding:14px;
border-radius:15px;
margin-bottom:15px;
max-width:80%;
width:fit-content;
word-wrap:break-word;
}

.bot{
background:#8b5cf6;
}

.user{
background:#00d4ff;
color:#000;
margin-left:auto;
}

.input-area{
display:flex;
gap:15px;
}

.input-area input{
flex:1;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
}

.input-area input::placeholder{
color:#aaa;
}

.input-area button{
padding:15px 25px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00d4ff,#8b5cf6);
color:white;
font-weight:600;
cursor:pointer;
}

/* Responsive */

@media(max-width:900px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
}

.topbar{
flex-direction:column;
align-items:flex-start;
gap:20px;
}

}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">
LNS <span>AI</span>
</div>

<div class="menu">

<a href="#">🏠 Dashboard</a>

<a href="#">🤖 AI Chats</a>

<a href="#">📊 Analytics</a>

<a href="#">⚙ Settings</a>

<a href="#" onclick="logout()">
🚪 Logout
</a>

</div>

</div>

<!-- Main -->

<div class="main">

<!-- Top -->

<div class="topbar">

<h1>
Welcome,
<span id="username">
User
</span>
🚀
</h1>

<button onclick="upgrade()">
Upgrade
</button>

</div>

<!-- Cards -->

<div class="cards">

<div class="card">
<h2>12K+</h2>
<p>AI Conversations</p>
</div>

<div class="card">
<h2>98%</h2>
<p>Accuracy</p>
</div>

<div class="card">
<h2>350+</h2>
<p>Users</p>
</div>

<div class="card">
<h2>24/7</h2>
<p>Support</p>
</div>

</div>

<!-- Chat Box -->

<div class="chat-box">

<h2>
🤖 LNS AI Assistant
</h2>

<div class="messages" id="messages">

<div class="bot">
👋 Hello! Welcome to LNS AI Dashboard.
</div>

<div class="bot">
Ask me anything!
</div>

</div>

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Ask LNS AI..."
autocomplete="off"
>

<button id="sendBtn">
Send
</button>

</div>

</div>

</div>
<script>

/* ===========================
   LOGIN CHECK + USERNAME
=========================== */


window.onload = function(){

let user = localStorage.getItem("loggedInUser");

if(user){
document.getElementById("username").innerText=user;
}else{
document.getElementById("username").innerText="Guest";
}

scrollBottom();

};

/* ===========================
   ELEMENTS
=========================== */

const input=document.getElementById("userInput");
const sendBtn=document.getElementById("sendBtn");
const messages=document.getElementById("messages");


/* ===========================
   SCROLL
=========================== */

function scrollBottom(){
messages.scrollTop=messages.scrollHeight;
}


/* ===========================
   ADD MESSAGE
=========================== */

function addUserMessage(text){

const div=document.createElement("div");

div.className="user";

div.innerText=text;

messages.appendChild(div);

scrollBottom();

}


function addBotMessage(text){

const div=document.createElement("div");

div.className="bot";

div.innerText=text;

messages.appendChild(div);

scrollBottom();

}


/* ===========================
   SIMPLE OFFLINE AI
=========================== */

function aiReply(msg){

msg=msg.toLowerCase();

if(
msg.includes("hi") ||
msg.includes("hello")
){
return "Hello 👋 Welcome to LNS AI!";
}

if(msg.includes("name")){
return "My name is LNS AI 🤖";
}

if(msg.includes("time")){
return "⏰ Current Time : "
+new Date().toLocaleTimeString();
}

if(msg.includes("date")){
return "📅 Today : "
+new Date().toLocaleDateString();
}

if(msg.includes("thank")){
return "😊 You're welcome!";
}

if(msg.includes("how are you")){
return "I'm doing great 🚀";
}

if(msg.includes("bye")){
return "👋 Goodbye! Have a nice day.";
}

if(msg.includes("dashboard")){
return "🚀 Dashboard is running smoothly.";
}

if(msg.includes("ai")){
return "🤖 LNS AI is active and ready!";
}

return "🧠 I understood: \""+msg+"\"";

}


/* ===========================
   SEND
=========================== */

function sendMessage(){

let text=input.value.trim();

if(text===""){
return;
}

addUserMessage(text);

input.value="";

const typing=document.createElement("div");

typing.className="bot";

typing.innerText="Thinking...";

messages.appendChild(typing);

scrollBottom();

setTimeout(function(){

typing.innerText=aiReply(text);

scrollBottom();

},800);

}


sendBtn.onclick=sendMessage;


/* ===========================
   ENTER KEY
=========================== */

input.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){
sendMessage();
}

}
);


/* ===========================
   LOGOUT
=========================== */

function logout(){

let ok=confirm(
"Do you want to logout?"
);

if(ok){

localStorage.removeItem(
"loggedInUser"
);

function logout(){

if(confirm("Logout?")){

localStorage.removeItem("loggedInUser");

document.getElementById("username").innerText="Guest";

alert("Logged out!");

}

};

}

}


/* ===========================
   UPGRADE
=========================== */

function upgrade(){

alert(
"🚀 LNS AI Premium Coming Soon!"
);

}

</script>

</body>
</html>
